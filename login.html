<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ingresar · Subatir</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07090f;--bg2:#0c1119;--teal:#0e8aaa;--tl:#1bc8ff;--or:#f97316;--orl:#fb923c;
  --txt:#e2e8f0;--mut:#5a6a80;--mut2:#7a8fa8;--bdr:rgba(255,255,255,.08);--red:#ef4444;--grn:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 8% 8%,rgba(14,138,170,.15) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 92% 92%,rgba(249,115,22,.12) 0%,transparent 55%)}
.card{position:relative;z-index:1;width:100%;max-width:400px;padding:38px 32px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid var(--bdr);
  border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
.logo-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;
  background:linear-gradient(135deg,var(--teal),var(--or));box-shadow:0 8px 24px rgba(249,115,22,.3)}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;letter-spacing:-.5px}
.sub{text-align:center;color:var(--mut2);font-size:12px;margin-top:4px;margin-bottom:26px}
label{display:block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--mut2);margin-bottom:6px;margin-top:16px}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--bdr);
  background:rgba(255,255,255,.04);color:var(--txt);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:rgba(27,200,255,.5);background:rgba(255,255,255,.06)}
button.go{width:100%;margin-top:24px;padding:13px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--teal),var(--or));transition:filter .15s,transform .15s}
button.go:hover{filter:brightness(1.08);transform:translateY(-1px)}
button.go:disabled{opacity:.6;cursor:wait;transform:none}
.msg{margin-top:16px;padding:10px 12px;border-radius:9px;font-size:12px;display:none}
.msg.err{display:block;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fca5a5}
.msg.ok{display:block;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#86efac}
.foot{text-align:center;margin-top:22px;font-size:10px;color:var(--mut);font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-icon">SB</div></div>
  <h1>Subatir</h1>
  <div class="sub">Sistema de Compras & Stock</div>

  <form id="form" autocomplete="on">
    <label for="email">Email</label>
    <input type="email" id="email" required placeholder="tu@email.com" autocomplete="username"/>
    <label for="pass">Contraseña</label>
    <input type="password" id="pass" required placeholder="••••••••" autocomplete="current-password"/>
    <button class="go" id="btn" type="submit">Ingresar</button>
  </form>
  <div class="msg" id="msg"></div>
  <div class="foot">Acceso restringido · Subatir S.A. / Prolimpio</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
var msg = document.getElementById('msg');
function show(t, type){ msg.textContent = t; msg.className = 'msg ' + type; }

// Avisos por querystring
var qs = new URLSearchParams(location.search);
if (qs.get('inactivo')) show('Tu usuario está desactivado. Contactá al administrador.', 'err');

// Si ya hay sesión activa, ir al dashboard
SB.auth.getSession().then(function(r){ if (r.data && r.data.session) location.replace('index.html'); });

document.getElementById('form').addEventListener('submit', function(e){
  e.preventDefault();
  var btn = document.getElementById('btn');
  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('pass').value;
  btn.disabled = true; btn.textContent = 'Ingresando…'; msg.className = 'msg';
  SB.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
    if (res.error){
      show(res.error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos.' : res.error.message, 'err');
      btn.disabled = false; btn.textContent = 'Ingresar';
      return;
    }
    show('¡Bienvenido! Redirigiendo…', 'ok');
    location.replace('index.html');
  });
});
</script>
</body>
</html>
